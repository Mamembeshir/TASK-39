services:
  mongodb:
    image: mongo:7
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet mongodb://127.0.0.1:27017/admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      start_period: 10s
      interval: 15s
      timeout: 5s
      retries: 20
    tmpfs:
      - /data/db

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - SEED_FIXTURES=${SEED_FIXTURES:-false}
      - INTERNAL_ROUTES_ENABLED=${INTERNAL_ROUTES_ENABLED:-false}
      - INTERNAL_ROUTES_TOKEN=${INTERNAL_ROUTES_TOKEN:-dev-internal-token}
      - TEST_NOW_ENABLED=true
      - AUTH_RESPONSE_INCLUDE_TOKENS=${AUTH_RESPONSE_INCLUDE_TOKENS:-false}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-dev-compose-access-secret-2026}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-dev-compose-refresh-secret-2026}
      - FIELD_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      - CORS_ALLOWLIST=https://localhost:4000,http://localhost:5173,https://localhost,http://frontend-pw:5173
      - LOG_LEVEL=info
      - MEDIA_UPLOAD_DIR=/data/uploads
      - MEDIA_ENABLE_PROCESSING=false
      - TRUST_PROXY_HEADERS=${TRUST_PROXY_HEADERS:-false}
      - TLS_ENABLED=${TLS_ENABLED:-true}
      - TLS_KEY_PATH=/app/certs/localhost.key
      - TLS_CERT_PATH=/app/certs/localhost.crt
      - PORT=4000
      - MONGO_URI=mongodb://mongodb:27017/homecareops_test
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$$TLS_ENABLED\" = \"true\" ]; then curl -k -fsS https://127.0.0.1:4000/api/health >/dev/null; else curl -fsS http://127.0.0.1:4000/api/health >/dev/null; fi || exit 1"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 60
    ports:
      - "127.0.0.1:4000:4000"
    tmpfs:
      - /data/uploads
    volumes:
      - ./certs:/app/certs:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      - VITE_API_BASE_URL=https://localhost:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5173 >/dev/null || exit 1"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 60
    ports:
      - "5173:5173"

  # Separate Vite dev-server for Playwright: proxies /api/* to the backend so
  # the browser never needs to resolve https://localhost:4000.
  frontend-pw:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      # Point client to this container's own origin; Vite proxy handles /api/*
      - VITE_API_BASE_URL=http://frontend-pw:5173
      # vite.config.ts reads this env var to enable the /api proxy
      - API_PROXY_TARGET=http://api:4000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://127.0.0.1:5173 >/dev/null || exit 1"]
      start_period: 20s
      interval: 5s
      timeout: 5s
      retries: 60

  playwright:
    build:
      context: .
      dockerfile: frontend/tests/e2e/Dockerfile
    environment:
      - FRONTEND_URL=http://frontend-pw:5173
    depends_on:
      frontend-pw:
        condition: service_healthy
      api:
        condition: service_healthy

  test-runner:
    build:
      context: .
      dockerfile: test-runner/Dockerfile
    environment:
      - API_BASE_URL=http://api:4000
      - INTERNAL_ROUTES_ENABLED=${INTERNAL_ROUTES_ENABLED:-false}
      - INTERNAL_ROUTES_TOKEN=${INTERNAL_ROUTES_TOKEN:-dev-internal-token}
      - TEST_MONGO_URI=mongodb://mongodb:27017/homecareops_test
      - FRONTEND_DIR=/workspace/frontend
      - BACKEND_DIR=/workspace/backend
    depends_on:
      mongodb:
        condition: service_healthy
      api:
        condition: service_healthy
      frontend:
        condition: service_healthy
    command: ["./run_tests.sh"]
